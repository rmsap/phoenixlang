name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      # Node drives every `extern js` interop tier that runs the generated glue:
      # the glue unit tests (`extern_js_glue.rs`), the always-on Node fixture tier
      # (`interop_node.rs`), and the WASM columns of the five-backend interop
      # matrix (`interop_matrix.rs`) — on BOTH wasm targets (wasm32-linear and
      # wasm32-gc, the latter via node's native WasmGC support). Provision Node
      # here so those tiers actually execute rather than soft-skip, and so the
      # `PHOENIX_REQUIRE_NODE` / `PHOENIX_REQUIRE_WASM_GC` gates below are
      # satisfiable.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasmtime
        # The wasmtime version is the single source of truth in
        # `.wasmtime-version` at the repo root. Local dev setup reads
        # the same file, so CI and the workstation stay in lockstep
        # without a separate `WASMTIME_VERSION` env that can drift.
        # Downloaded as a prebuilt release tarball — no third-party
        # action (supply chain) and no from-source `cargo install`
        # (slow, not restored by rust-cache).
        #
        # Linux-only: the URL hardcodes the `x86_64-linux` tarball, so
        # gate on `runner.os == 'Linux'`. Adding a macOS row to the
        # matrix without expanding this step would otherwise 404 on the
        # tarball download; with the gate it surfaces as `wasmtime not
        # installed` in the require-wasmtime test step instead.
        if: runner.os == 'Linux'
        run: |
          version="$(tr -d '[:space:]' < .wasmtime-version)"
          url="https://github.com/bytecodealliance/wasmtime/releases/download/${version}/wasmtime-${version}-x86_64-linux.tar.xz"
          curl -fsSL "$url" -o /tmp/wasmtime.tar.xz
          tar -xf /tmp/wasmtime.tar.xz -C /tmp
          echo "/tmp/wasmtime-${version}-x86_64-linux" >> "$GITHUB_PATH"
      - name: Verify wasmtime version matches .wasmtime-version
        # Strict equality is intentional: a wasmtime release that
        # changed our behavior must come with an explicit
        # `.wasmtime-version` bump, not a silent acceptance via a
        # prefix match. `wasmtime --version` prints e.g.
        # `wasmtime-cli 45.0.0`; the pinned tag is `v45.0.0`. If a
        # future wasmtime release alters the `--version` output format
        # (a hash, "dev" suffix, etc.), update the parser here to
        # match — do *not* loosen the comparison.
        if: runner.os == 'Linux'
        run: |
          pinned="$(tr -d '[:space:]' < .wasmtime-version)"
          pinned_no_v="${pinned#v}"
          actual="$(wasmtime --version | awk '{print $2}')"
          if [ "$actual" != "$pinned_no_v" ]; then
            echo "::error::wasmtime version drift: .wasmtime-version pins ${pinned} (→ ${pinned_no_v}), but the installed binary reports ${actual}"
            exit 1
          fi
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -p phoenix-common
      - run: cargo test -p phoenix-lexer
      - run: cargo test -p phoenix-parser
      - run: cargo test -p phoenix-sema
      - run: cargo test -p phoenix-interp
      - run: cargo test -p phoenix-ir
      - run: cargo test -p phoenix-ir-interp
      - run: cargo test -p phoenix-codegen
      - run: cargo test -p phoenix-lsp
      - run: cargo test -p phoenix-runtime
      - run: cargo build -p phoenix-runtime
      - run: cargo build -p phoenix-runtime --target wasm32-wasip1 --release
      # Force the wasm tiers to fail loudly rather than silently skip,
      # on both the driver matrix (which reaches wasm via
      # `backend_matrix`) and the cranelift wasm tests:
      # REQUIRE_RUNTIME_WASM if the wasm runtime artifact is missing,
      # REQUIRE_WASMTIME if the `wasmtime` binary isn't on PATH. Both
      # are provisioned above, so a skip here means a real regression.
      - run: cargo test -p phoenix-driver
        env:
          PHOENIX_REQUIRE_RUNTIME_LIB: "1"
          PHOENIX_REQUIRE_RUNTIME_WASM: "1"
          PHOENIX_REQUIRE_WASMTIME: "1"
          # `node` is provisioned above, so the `extern js` glue + interop tiers
          # must run, not soft-skip. A missing `node` is then a hard failure here.
          PHOENIX_REQUIRE_NODE: "1"
          # The wasm32-gc interop columns (interop_node + interop_matrix) run the
          # gc glue under node's native WasmGC support — a distinct path from the
          # wasmtime gc execution gated above. Require it so a node build without
          # WasmGC is a hard failure rather than a silent skip of the gc columns.
          # (The DOM/browser tier's gc tests in this same crate still soft-skip:
          # they additionally need the browser npm deps, absent in this job — the
          # `interop-browser` job below provisions those and runs them hard.)
          PHOENIX_REQUIRE_WASM_GC: "1"
      - run: cargo test -p phoenix-cranelift
        env:
          PHOENIX_REQUIRE_RUNTIME_LIB: "1"
          PHOENIX_REQUIRE_RUNTIME_WASM: "1"
          PHOENIX_REQUIRE_WASMTIME: "1"

  # Native Windows gate. The `check` job runs on Ubuntu and never compiles the
  # `#[cfg(target_os = "windows")]` MSVC link path in
  # `phoenix-cranelift/src/link.rs`, so a Windows-only regression would
  # otherwise surface only at release time. windows-latest ships VS Build Tools,
  # so this both lints the Windows cfg (clippy `-D warnings` across all targets)
  # and exercises the real `link.exe` path end-to-end — the link tests compile a
  # trivial object with `cl.exe`, link it via `link_executable`, and run the
  # result. Free on public repos (standard runner). `PHOENIX_REQUIRE_RUNTIME_LIB`
  # makes a missing `phoenix_runtime.lib` a hard failure rather than a silent
  # skip, since the build step below provisions it.
  windows-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build -p phoenix-runtime
      - name: Native MSVC link tests
        run: |
          cargo test -p phoenix-cranelift --lib link::
        env:
          PHOENIX_REQUIRE_RUNTIME_LIB: "1"

  # Browser / DOM verification tier for `extern js` interop (Phase 2.5 decision I).
  # The same DOM fixtures + baselines (`tests/fixtures/interop/dom/<name>/`) run on
  # BOTH wasm targets through two runners in `tests/interop-browser/`: the jsdom
  # smoke (DOM-host marshalling + the retained-event-handler path at the API level)
  # and the real-Chromium Playwright tier (a real click in a real engine). Kept off
  # the fast `check` job because it provisions npm deps + a headless browser (slow,
  # and a browser download). The gates make every requirement a HARD failure so
  # this job can't silently stop exercising the DOM path:
  #   - REQUIRE_BROWSER_DEPS: jsdom + playwright-core must be installed (npm ci)
  #   - REQUIRE_BROWSER:      a headless Chromium must be launchable
  #   - REQUIRE_NODE / RUNTIME_WASM / WASM_GC: node + both wasm targets, no skips
  # See crates/phoenix-driver/tests/interop_browser.rs.
  interop-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # The linear DOM build links the wasm runtime (gc embeds none), so build it
      # here for the same reason the `check` job does — otherwise the linear
      # columns soft-skip. No native runtime lib / wasmtime needed: this tier runs
      # entirely under node + the browser, never natively or under wasmtime.
      - run: cargo build -p phoenix-runtime --target wasm32-wasip1 --release
      # Install the harness's npm deps (jsdom + playwright-core) from the committed
      # lockfile; REQUIRE_BROWSER_DEPS below then hard-fails if they're missing.
      - name: Install interop-browser npm deps (npm ci)
        working-directory: tests/interop-browser
        run: npm ci
      # Provision the Chromium build matching the pinned playwright-core, via its
      # OWN installer CLI (run from the harness dir so npx resolves the local,
      # version-locked playwright-core) — so the browser revision can't drift from
      # the launcher. `--with-deps` pulls the OS libraries headless Chromium needs.
      - name: Install headless Chromium (matching playwright-core)
        working-directory: tests/interop-browser
        run: npx playwright-core install --with-deps chromium
      - name: Browser/DOM interop tier (both wasm targets, jsdom + Playwright)
        run: cargo test -p phoenix-driver --test interop_browser
        env:
          PHOENIX_REQUIRE_NODE: "1"
          PHOENIX_REQUIRE_RUNTIME_WASM: "1"
          PHOENIX_REQUIRE_WASM_GC: "1"
          PHOENIX_REQUIRE_BROWSER_DEPS: "1"
          PHOENIX_REQUIRE_BROWSER: "1"

  # Shift-left release gate: the `check` job above runs the suite in debug, but
  # the binaries we ship are built `--release`, where `debug_assert!` is
  # stripped, integer overflow is checked (see `[profile.release]` in
  # Cargo.toml), and the optimizer runs. Run the suite in that profile too so a
  # release-only divergence surfaces on the PR, not at `git tag` time. The
  # release pipeline (release.yml) has its own hard gate; this is the early
  # warning.
  #
  # Scoped to PRs and pushes to `main` (not every feature-branch push) so the
  # second full compile doesn't tax routine pushes. Wasm tiers soft-skip here,
  # same rationale as release.yml's `test` job — the debug `check` job is the
  # wasm-tier gate; this job validates native release-config correctness.
  release-test:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the runtime static lib (uplifted to target/release/, where the
      # release `phoenix` binary discovers it) so the native integration tests
      # actually RUN in release profile — that's the point of this job, and
      # native GC/codegen behavior under overflow-checks/opt is its main value.
      # The wasm tier still soft-skips (no wasm runtime / wasmtime here); it's
      # gated by the debug `check` job. `PHOENIX_REQUIRE_RUNTIME_LIB=1` turns a
      # missing/undiscoverable lib into a hard failure rather than a silent skip.
      - run: cargo build -p phoenix-runtime --release
      - name: Test in the release profile (matches shipped binaries)
        run: cargo test --workspace --release
        env:
          PHOENIX_REQUIRE_RUNTIME_LIB: "1"

  # Phoenix Gen behavioral checks: the compile-and-lint harness (generated code
  # compiles, type-checks, lints, is formatted) AND the round-trip harness
  # (generated client ↔ generated server agree on the wire). Kept OFF the fast
  # `check` job because it installs Go/Node/redocly toolchains (slow) and shells
  # out to them. `PHOENIX_GEN_E2E=1` makes a missing toolchain a HARD failure
  # instead of a silent skip, so this job cannot quietly stop exercising a
  # target. See `crates/phoenix-codegen/tests/{compiles_and_lints,roundtrip}.rs`.
  gen-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      # golangci-lint is invoked by the Go target step of the harness; the
      # binary must be on PATH or the E2E gate hard-fails.
      - name: Install golangci-lint
        run: |
          curl -fsSL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.61.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # redocly is fetched on demand via `npx --yes @redocly/cli`; pre-warm it
      # so the OpenAPI target step does not pay the download inside the test.
      - name: Pre-fetch redocly CLI
        run: npx --yes @redocly/cli --version
      # The TypeScript target runs tsc/eslint/prettier against the pinned npm
      # project at tests/scaffold/typescript. Install its locked deps so the
      # harness's node_modules check passes and the E2E gate stays enforced.
      - name: Install TypeScript scaffold deps (npm ci)
        working-directory: crates/phoenix-codegen/tests/scaffold/typescript
        run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The Python target runs black/ruff/mypy against the pinned project at
      # tests/scaffold/python. Create its local .venv and install the locked
      # deps so the harness's .venv check passes and the E2E gate stays enforced.
      - name: Install Python scaffold deps (venv)
        working-directory: crates/phoenix-codegen/tests/scaffold/python
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
      - name: Compile-and-lint generated output (all installed targets)
        env:
          PHOENIX_GEN_E2E: "1"
        run: cargo test -p phoenix-codegen --test compiles_and_lints

      # The behavioral round-trip suite runs the generated client against the
      # generated server per target. Its drivers use their OWN pinned dep sets
      # (separate from the compile-and-lint scaffolds above): the TS driver is a
      # committed npm project, the Python driver a committed venv. Install both
      # so the round-trip harness's node_modules/.venv gates pass and the E2E
      # gate stays enforced. Go needs no extra deps (stdlib httptest).
      - name: Install TypeScript round-trip driver deps (npm ci)
        working-directory: crates/phoenix-codegen/tests/roundtrip/typescript
        run: npm ci
      - name: Install Python round-trip driver deps (venv)
        working-directory: crates/phoenix-codegen/tests/roundtrip/python
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
      - name: Round-trip generated client against generated server (all targets)
        env:
          PHOENIX_GEN_E2E: "1"
        run: cargo test -p phoenix-codegen --test roundtrip

      # Parity guard: the standalone `phoenix-gen` binary and `phoenix gen`
      # must accept an identical option surface (roadmap §8).
      - name: Help parity (phoenix gen vs phoenix-gen)
        run: cargo test -p phoenix-driver --test help_parity
