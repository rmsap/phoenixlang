name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test -p phoenix-common
      - run: cargo test -p phoenix-lexer
      - run: cargo test -p phoenix-parser
      - run: cargo test -p phoenix-sema
      - run: cargo test -p phoenix-interp
      - run: cargo test -p phoenix-ir
      - run: cargo test -p phoenix-ir-interp
      - run: cargo test -p phoenix-codegen
      - run: cargo test -p phoenix-lsp
      - run: cargo test -p phoenix-runtime
      - run: cargo build -p phoenix-runtime
      - run: cargo build -p phoenix-runtime --target wasm32-wasip1 --release
      - run: cargo test -p phoenix-driver
      - run: cargo test -p phoenix-cranelift
