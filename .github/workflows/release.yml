name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate: the suite must pass compiled with the SAME profile we ship
  # (`--release`) before any artifact is built or published. ci.yml runs the
  # suite in debug on every push; this is the last line of defense so a release
  # binary cannot go out untested in its shipping configuration (debug_assert
  # stripping, overflow-check, and opt-level differences all bite only here).
  #
  # Runs on the host arch only — the cross-compiled targets in `build` can't be
  # executed in CI, so logic correctness is validated here on x86_64-linux and
  # the matrix below is trusted to cross-compile the same validated source.
  #
  # The wasm tiers soft-skip here (no wasm runtime built / no wasmtime
  # installed in this job): this job is the release-PROFILE logic gate
  # (overflow-checks, debug_assert stripping, opt-level). The wasm tier's
  # release-config logic is covered by ci.yml's `check` job, and the SHIPPED
  # wasm artifact (now bundled — `lib/phoenix_runtime.wasm`, see `build`) is
  # proven end-to-end by the `smoke-test` job below, which builds and runs a
  # wasm32-linear program under wasmtime from the installed layout.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Build the runtime static lib (uplifted to target/release/) so the
      # native integration tests RUN in release profile rather than failing on
      # a missing lib. The wasm tier still soft-skips here (no wasm runtime /
      # wasmtime); it's gated by ci.yml's `check`. `PHOENIX_REQUIRE_RUNTIME_LIB`
      # makes a missing lib a hard failure, not a silent skip.
      - run: cargo build -p phoenix-runtime --release
      - name: Test in the release profile (the configuration we ship)
        run: cargo test --workspace --release
        env:
          PHOENIX_REQUIRE_RUNTIME_LIB: "1"

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-wasip1 alongside the native target: the wasm32-linear
          # backend embeds a prebuilt `phoenix_runtime.wasm`, which we ship
          # in the tarball so a downloaded Phoenix can compile to wasm.
          targets: ${{ matrix.target }}, wasm32-wasip1

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      # The wasm runtime is host-independent (a WebAssembly module), so the
      # same `phoenix_runtime.wasm` is built and shipped on every matrix row.
      # It's what the wasm32-linear backend embeds into compiled output.
      - name: Build wasm runtime (for wasm32-linear)
        run: cargo build -p phoenix-runtime --target wasm32-wasip1 --release

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist dist/lib
          cp target/${{ matrix.target }}/release/phoenix dist/
          cp target/${{ matrix.target }}/release/phoenix-lsp dist/
          cp target/${{ matrix.target }}/release/libphoenix_runtime.a dist/lib/
          cp target/wasm32-wasip1/release/phoenix_runtime.wasm dist/lib/
          tar czf phoenix-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path dist/lib
          Copy-Item target/${{ matrix.target }}/release/phoenix.exe dist/
          Copy-Item target/${{ matrix.target }}/release/phoenix-lsp.exe dist/
          Copy-Item target/${{ matrix.target }}/release/phoenix_runtime.lib dist/lib/
          Copy-Item target/wasm32-wasip1/release/phoenix_runtime.wasm dist/lib/
          Compress-Archive -Path dist/* -DestinationPath phoenix-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: phoenix-${{ matrix.target }}
          path: phoenix-${{ github.ref_name }}-${{ matrix.target }}.*

  # Artifact gate: prove the thing a user actually downloads works on EVERY
  # shipped platform, not just the in-tree build. The `test` job above runs
  # the suite against the `target/` build (dev-tree discovery paths); this
  # downloads each SHIPPED archive and runs it on a NATIVE runner for that
  # arch (all free standard runners on a public repo — incl. arm64 Linux and
  # both macOS arches), so the per-platform Cranelift ISA, object format,
  # linker invocation, and runtime ABI are actually exercised — coverage
  # cross-compilation alone cannot give. Each row unpacks into the layout
  # `install.sh` produces (`bin/` + `lib/`) and builds `hello.phx` with
  # $PHOENIX_RUNTIME_LIB / $PHOENIX_RUNTIME_WASM unset, forcing the
  # `bin/../lib/` install-layout discovery a real install relies on:
  #   - native: every platform. Unix links via `cc`; Windows links via MSVC
  #     `link.exe` (`link.rs` `run_linker`), which windows-latest provides.
  #   - wasm32-linear: every platform, run under `wasmtime` (the wasm path
  #     never touches the system linker).
  # `release` gates on this, so a broken artifact on any platform blocks
  # publishing instead of shipping. `fail-fast: false` so one platform's
  # failure still lets the others report.
  smoke-test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            wasmtime_platform: x86_64-linux
            wasmtime_archive: tar.xz
            native: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            wasmtime_platform: aarch64-linux
            wasmtime_archive: tar.xz
            native: true
          - os: macos-13
            target: x86_64-apple-darwin
            wasmtime_platform: x86_64-macos
            wasmtime_archive: tar.xz
            native: true
          - os: macos-latest
            target: aarch64-apple-darwin
            wasmtime_platform: aarch64-macos
            wasmtime_archive: tar.xz
            native: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            wasmtime_platform: x86_64-windows
            wasmtime_archive: zip
            # windows-latest ships VS Build Tools, so the MSVC link path
            # (link.rs `run_linker`) can both link and run the produced .exe.
            native: true
    runs-on: ${{ matrix.os }}
    # bash on every runner (Git Bash on Windows) so one script shape works
    # cross-platform; `tar` is bsdtar on Windows/macOS and extracts .zip and
    # .tar.xz alike, and msys appends `.exe` when resolving `$PHX`/`$WASMTIME`.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - name: Download the ${{ matrix.target }} release artifact
        uses: actions/download-artifact@v5
        with:
          name: phoenix-${{ matrix.target }}
          path: artifact
      - name: Install wasmtime (to execute the wasm32-linear artifact)
        # Mirrors ci.yml: `.wasmtime-version` is the single source of truth.
        run: |
          version="$(tr -d '[:space:]' < .wasmtime-version)"
          plat="${{ matrix.wasmtime_platform }}"
          url="https://github.com/bytecodealliance/wasmtime/releases/download/${version}/wasmtime-${version}-${plat}.${{ matrix.wasmtime_archive }}"
          echo "Downloading $url"
          curl -fsSL "$url" -o wasmtime-archive
          mkdir -p wasmtime-install
          tar xf wasmtime-archive -C wasmtime-install
          echo "WASMTIME=wasmtime-install/wasmtime-${version}-${plat}/wasmtime" >> "$GITHUB_ENV"
      - name: Install into a prefix matching install.sh's bin/ + lib/ layout
        run: |
          mkdir -p unpacked prefix/bin prefix/lib
          tar xf artifact/phoenix-* -C unpacked
          # Copy the binaries (phoenix[.exe], phoenix-lsp[.exe]) and the whole
          # shipped lib/ (libphoenix_runtime.{a,lib} + phoenix_runtime.wasm).
          cp unpacked/phoenix* prefix/bin/
          cp unpacked/lib/* prefix/lib/
          chmod +x prefix/bin/* 2>/dev/null || true
          echo "PHX=prefix/bin/phoenix" >> "$GITHUB_ENV"
      - name: Build and run hello.phx (native)
        # $PHOENIX_RUNTIME_LIB unset forces discovery to the `bin/../lib/`
        # install path (link.rs path 4) that installed Phoenix uses. Explicit
        # -o is taken verbatim, so add the `.exe` suffix ourselves on Windows.
        if: matrix.native
        run: |
          unset PHOENIX_RUNTIME_LIB
          out=./out-native
          [ "$RUNNER_OS" = Windows ] && out=./out-native.exe
          "$PHX" build tests/fixtures/hello.phx --target native -o "$out"
          actual="$("$out" | tr -d '[:space:]')"
          if [ "$actual" != "42" ]; then
            echo "::error::artifact produced '$actual' (native on ${{ matrix.target }}), expected 42"
            exit 1
          fi
          echo "OK native ${{ matrix.target }}: $actual"
      - name: Build and run hello.phx (wasm32-linear)
        # $PHOENIX_RUNTIME_WASM unset forces the wasm runtime to resolve via
        # the shipped `bin/../lib/phoenix_runtime.wasm` install layout.
        run: |
          unset PHOENIX_RUNTIME_WASM
          "$PHX" build tests/fixtures/hello.phx --target wasm32-linear -o ./out.wasm
          actual="$("$WASMTIME" ./out.wasm | tr -d '[:space:]')"
          if [ "$actual" != "42" ]; then
            echo "::error::artifact produced '$actual' (wasm32-linear on ${{ matrix.target }}), expected 42"
            exit 1
          fi
          echo "OK wasm32-linear ${{ matrix.target }}: $actual"

  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_body: ${{ steps.notes.outputs.content }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate release notes for this tag
        id: notes
        run: |
          {
            echo 'content<<CLIFF_EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'CLIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepend CHANGELOG and bump extension version on a release branch
        run: |
          git fetch origin main
          git checkout -b release-${GITHUB_REF_NAME#v}
          git-cliff --config cliff.toml --latest --prepend CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          (cd editors/vscode && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          if git diff --quiet CHANGELOG.md editors/vscode/package.json editors/vscode/package-lock.json; then
            echo "No release changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md editors/vscode/package.json editors/vscode/package-lock.json
          git commit -m "chore(release): update CHANGELOG and bump extension version for ${{ github.ref_name }}"
          git push origin HEAD:release-${GITHUB_REF_NAME#v}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release-${GITHUB_REF_NAME#v}
          title: "Release ${{ github.ref_name }}"
          body: "Automated PR to update CHANGELOG and bump extension version for ${{ github.ref_name }}"

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Sync extension version to tag
        working-directory: editors/vscode
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Compile extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package .vsix
        working-directory: editors/vscode
        run: npx --yes @vscode/vsce package --out "phoenixlang-${GITHUB_REF_NAME}.vsix"

      - uses: actions/upload-artifact@v5
        with:
          name: vscode-extension
          path: editors/vscode/phoenixlang-*.vsix

  release:
    needs: [build, smoke-test, changelog, vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ needs.changelog.outputs.release_body }}
