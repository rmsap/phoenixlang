name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist dist/lib
          cp target/${{ matrix.target }}/release/phoenix dist/
          cp target/${{ matrix.target }}/release/phoenix-lsp dist/
          cp target/${{ matrix.target }}/release/libphoenix_runtime.a dist/lib/
          tar czf phoenix-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          New-Item -ItemType Directory -Force -Path dist/lib
          Copy-Item target/${{ matrix.target }}/release/phoenix.exe dist/
          Copy-Item target/${{ matrix.target }}/release/phoenix-lsp.exe dist/
          Copy-Item target/${{ matrix.target }}/release/phoenix_runtime.lib dist/lib/
          Compress-Archive -Path dist/* -DestinationPath phoenix-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: phoenix-${{ matrix.target }}
          path: phoenix-${{ github.ref_name }}-${{ matrix.target }}.*

  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_body: ${{ steps.notes.outputs.content }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate release notes for this tag
        id: notes
        run: |
          {
            echo 'content<<CLIFF_EOF'
            git-cliff --config cliff.toml --latest --strip all
            echo 'CLIFF_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Prepend CHANGELOG and bump extension version on main
        run: |
          git fetch origin main
          git checkout main
          git-cliff --config cliff.toml --latest --prepend CHANGELOG.md
          VERSION="${GITHUB_REF_NAME#v}"
          (cd editors/vscode && npm version "$VERSION" --no-git-tag-version --allow-same-version)
          if git diff --quiet CHANGELOG.md editors/vscode/package.json editors/vscode/package-lock.json; then
            echo "No release changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md editors/vscode/package.json editors/vscode/package-lock.json
          git commit -m "chore(release): update CHANGELOG and bump extension version for ${{ github.ref_name }}"
          git push origin main

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Sync extension version to tag
        working-directory: editors/vscode
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Compile extension
        working-directory: editors/vscode
        run: npm run compile

      - name: Package .vsix
        working-directory: editors/vscode
        run: npx --yes @vscode/vsce package --out "phoenixlang-${GITHUB_REF_NAME}.vsix"

      - uses: actions/upload-artifact@v5
        with:
          name: vscode-extension
          path: editors/vscode/phoenixlang-*.vsix

  release:
    needs: [build, changelog, vscode-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ needs.changelog.outputs.release_body }}
