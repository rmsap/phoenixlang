[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/rsaperstein/phoenix"

[workspace.dependencies]
# CLI
clap = { version = "4", features = ["derive"] }

# Testing
insta = { version = "1", features = ["glob"] }

# Serialization (AST dumps, debugging)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
