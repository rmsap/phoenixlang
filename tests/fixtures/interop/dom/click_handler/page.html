<!doctype html>
<html>
  <head><meta charset="utf-8" /></head>
  <body>
    <button id="btn">click me</button>
    <span id="label">unset</span>
    <!--
      Browser tier runs the program in-page; the jsdom tier ignores this script
      and drives the same glue + host from Node. One page.html serves both tiers.
    -->
    <script type="module">
      import { instantiate } from "./app.js";
      import { host } from "./host.mjs";
      const wasm = await (await fetch("./app.wasm")).arrayBuffer();
      const { run } = await instantiate({
        wasm,
        host: host({ document }),
        writeStdout: () => {},
      });
      run();
      window.__phoenixDone = true;
    </script>
  </body>
</html>
